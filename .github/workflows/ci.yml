name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            packages/scheduler/package-lock.json
            packages/react/package-lock.json

      - name: Install and build scheduler
        working-directory: packages/scheduler
        run: npm install && npm run build

      - name: Install and build react package
        working-directory: packages/react
        run: npm install && npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm pkg set dependencies.@prompd/cli="^0.5.0-beta.7"
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run smoke tests
        working-directory: frontend
        run: npm test

  electron-windows:
    name: Windows Build
    runs-on: windows-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build scheduler
        working-directory: packages/scheduler
        run: npm install && npm run build

      - name: Install and build react package
        working-directory: packages/react
        run: npm install && npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Electron (Windows)
        working-directory: frontend
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code signing
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompd-windows
          path: |
            frontend/dist-electron/*Setup*.exe
            frontend/dist-electron/*.exe
          retention-days: 90

  electron-macos:
    name: macOS Build
    runs-on: macos-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build scheduler
        working-directory: packages/scheduler
        run: npm install && npm run build

      - name: Install and build react package
        working-directory: packages/react
        run: npm install && npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Electron (macOS)
        working-directory: frontend
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing and notarization
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompd-macos
          path: |
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.zip
          retention-days: 90

  electron-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build scheduler
        working-directory: packages/scheduler
        run: npm install && npm run build

      - name: Install and build react package
        working-directory: packages/react
        run: npm install && npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Electron (Linux)
        working-directory: frontend
        run: npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompd-linux
          path: |
            frontend/dist-electron/*.AppImage
            frontend/dist-electron/*.deb
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [electron-windows, electron-macos, electron-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
