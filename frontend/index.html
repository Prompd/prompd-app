<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompd</title>
    <style>
      /* Splash screen styles - inline for instant display */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0a0f1a 0%, #111827 40%, #1e293b 70%, #0f172a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
        overflow: hidden;
      }

      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Animated background gradient orbs */
      #splash-screen::before,
      #splash-screen::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
        animation: float 8s ease-in-out infinite;
      }

      #splash-screen::before {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
        top: -100px;
        right: -100px;
        animation-delay: 0s;
      }

      #splash-screen::after {
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
        bottom: -80px;
        left: -80px;
        animation-delay: -4s;
      }

      /* Logo container with combined logos */
      .splash-logos {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
        position: relative;
        z-index: 1;
      }

      .splash-logo-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Prompd P logo */
      .splash-logo-p {
        width: 80px;
        height: 80px;
        animation: logoFloat 3s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(2, 148, 254, 0.5));
      }

      /* Plus sign between logos */
      .splash-plus {
        font-size: 32px;
        font-weight: 300;
        color: rgba(148, 163, 184, 0.6);
        animation: pulsePlus 2s ease-in-out infinite;
        text-shadow: 0 0 10px rgba(148, 163, 184, 0.3);
      }

      /* PrompdHub logo */
      .splash-logo-hub {
        width: 80px;
        height: 80px;
        animation: logoFloat 3s ease-in-out infinite;
        animation-delay: -1.5s;
        filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
      }

      /* Glow rings around logos */
      .glow-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid;
        opacity: 0;
        animation: ringPulse 3s ease-out infinite;
      }

      .glow-ring-1 {
        width: 100px;
        height: 100px;
        border-color: rgba(59, 130, 246, 0.4);
        animation-delay: 0s;
      }

      .glow-ring-2 {
        width: 120px;
        height: 120px;
        border-color: rgba(59, 130, 246, 0.2);
        animation-delay: 0.5s;
      }

      .glow-ring-hub-1 {
        width: 100px;
        height: 100px;
        border-color: rgba(139, 92, 246, 0.4);
        animation-delay: 0.25s;
      }

      .glow-ring-hub-2 {
        width: 120px;
        height: 120px;
        border-color: rgba(139, 92, 246, 0.2);
        animation-delay: 0.75s;
      }

      /* Title and subtitle */
      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        font-size: 42px;
        font-weight: 800;
        background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 50%, #f8fafc 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0 0 8px 0;
        letter-spacing: -1px;
        animation: shimmer 3s linear infinite;
        position: relative;
        z-index: 1;
      }

      #splash-subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        font-size: 16px;
        color: #64748b;
        margin: 0 0 40px 0;
        letter-spacing: 2px;
        text-transform: uppercase;
        position: relative;
        z-index: 1;
      }

      /* Loading bar */
      #splash-loader {
        width: 240px;
        height: 4px;
        background: rgba(51, 65, 85, 0.5);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        z-index: 1;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
      }

      #splash-loader-bar {
        width: 30%;
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
        background-size: 200% 100%;
        border-radius: 4px;
        animation: loadingBar 1.8s ease-in-out infinite;
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
      }

      #splash-version {
        position: absolute;
        bottom: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        font-size: 12px;
        color: #475569;
        letter-spacing: 1px;
        z-index: 1;
      }

      /* Floating particles */
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(148, 163, 184, 0.3);
        border-radius: 50%;
        animation: particleFloat 10s linear infinite;
      }

      .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
      .particle:nth-child(2) { left: 20%; animation-delay: -2s; animation-duration: 10s; }
      .particle:nth-child(3) { left: 30%; animation-delay: -4s; animation-duration: 14s; }
      .particle:nth-child(4) { left: 50%; animation-delay: -1s; animation-duration: 11s; }
      .particle:nth-child(5) { left: 70%; animation-delay: -3s; animation-duration: 13s; }
      .particle:nth-child(6) { left: 80%; animation-delay: -5s; animation-duration: 9s; }
      .particle:nth-child(7) { left: 90%; animation-delay: -2.5s; animation-duration: 15s; }

      /* Animations */
      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -30px) scale(1.1); }
      }

      @keyframes logoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      @keyframes pulsePlus {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }

      @keyframes ringPulse {
        0% { transform: scale(0.8); opacity: 0.6; }
        100% { transform: scale(1.4); opacity: 0; }
      }

      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      @keyframes loadingBar {
        0% { transform: translateX(-100%); background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { transform: translateX(400%); background-position: 0% 50%; }
      }

      @keyframes particleFloat {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
      }

      /* Hide body scroll during splash */
      body.splash-active {
        overflow: hidden;
      }
    </style>
  </head>
  <body class="splash-active">
    <!-- Splash Screen - shown immediately while app loads -->
    <div id="splash-screen">
      <!-- Floating particles -->
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>

      <!-- Combined logos: Prompd P + PrompdHub -->
      <div class="splash-logos">
        <div class="splash-logo-wrapper">
          <div class="glow-ring glow-ring-1"></div>
          <div class="glow-ring glow-ring-2"></div>
          <img class="splash-logo-p" src="/logo.png" alt="Prompd" />
        </div>

        <span class="splash-plus">+</span>

        <div class="splash-logo-wrapper">
          <div class="glow-ring glow-ring-hub-1"></div>
          <div class="glow-ring glow-ring-hub-2"></div>
          <img class="splash-logo-hub" src="/prompdhub-logo.svg" alt="PrompdHub" />
        </div>
      </div>

      <h1 id="splash-title">Prompd</h1>
      <p id="splash-subtitle">Composable AI Prompts</p>

      <div id="splash-loader">
        <div id="splash-loader-bar"></div>
      </div>

      <span id="splash-version">Initializing...</span>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
